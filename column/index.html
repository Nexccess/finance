<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保証協会融資コラム一覧 | Nexcess</title>
<meta name="description" content="建設業・飲食業・運送業・一人親方向けの保証協会融資コラム。審査対策・資金繰り・書類作成など実務に基づく情報を提供します。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;color:#1a1a1a;background:#f5f3e8;line-height:1.7}
.nav{background:#1a5c1a;border-bottom:3px solid #009a3c;padding:.85rem 2rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.nav a{text-decoration:none}
.nav-logo{display:flex;align-items:center;gap:.75rem}
.nav-mark{width:36px;height:36px;background:#fff;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-weight:700;font-size:.82rem;color:#1a5c1a}
.nav-name{color:#fff;font-size:.92rem;font-weight:600;letter-spacing:.06em}
.nav-back{color:rgba(255,255,255,.8);font-size:.8rem;letter-spacing:.06em;border:1px solid rgba(255,255,255,.3);padding:.4rem .9rem;border-radius:3px;transition:all .2s}
.nav-back:hover{background:rgba(255,255,255,.1);color:#fff}

.page-header{background:#1a5c1a;padding:4rem 2rem 3rem;text-align:center;position:relative;overflow:hidden}
.page-header::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:48px 48px}
.page-header-in{position:relative;z-index:1}
.page-lbl{font-size:.7rem;letter-spacing:.22em;color:rgba(255,255,255,.5);margin-bottom:.6rem}
.page-ttl{font-family:'Noto Serif JP',serif;font-size:clamp(1.5rem,3vw,2rem);font-weight:700;color:#fff;margin-bottom:.75rem}
.page-desc{font-size:.88rem;color:rgba(255,255,255,.7);max-width:560px;margin:0 auto}

.main{max-width:1100px;margin:0 auto;padding:3.5rem 2rem}

.filters{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2.5rem}
.filter-btn{background:#fff;border:1.5px solid #d8e8d8;padding:.4rem .9rem;border-radius:2px;font-size:.78rem;font-weight:600;color:#4a5a4a;cursor:pointer;transition:all .2s;letter-spacing:.06em}
.filter-btn.active,.filter-btn:hover{background:#009a3c;border-color:#009a3c;color:#fff}

.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem}
.col-card{background:#fff;border:1.5px solid #d8e8d8;border-radius:3px;padding:1.6rem;text-decoration:none;display:block;transition:all .3s ease}
.col-card:hover{border-color:#009a3c;box-shadow:0 4px 18px rgba(0,154,60,.1);transform:translateY(-2px)}
.col-tag{display:inline-block;background:#e8f5ee;color:#009a3c;font-size:.65rem;font-weight:700;padding:.2rem .55rem;border-radius:2px;letter-spacing:.08em;margin-bottom:.85rem}
.col-ttl{font-size:.92rem;font-weight:600;color:#1a3a1a;line-height:1.55;margin-bottom:.6rem}
.col-desc{font-size:.8rem;color:#5a6a5a;line-height:1.75;margin-bottom:.85rem}
.col-meta{display:flex;align-items:center;justify-content:space-between}
.col-date{font-size:.72rem;color:#8a9a8a}
.col-more{font-size:.75rem;color:#009a3c;font-weight:600}

.loading{text-align:center;padding:3rem;color:#5a6a5a;font-size:.9rem}

footer{background:#0d2e0d;padding:1.75rem 2rem;text-align:center;border-top:3px solid #009a3c;margin-top:4rem}
.ft-name{font-family:'Noto Serif JP',serif;font-size:.92rem;color:#fff;letter-spacing:.1em;margin-bottom:.35rem}
.ft-copy{font-size:.68rem;color:rgba(255,255,255,.25);letter-spacing:.08em}
</style>
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-logo">
    <div class="nav-mark">NX</div>
    <div><span class="nav-name">Nexcess</span></div>
  </a>
  <a href="../index.html" class="nav-back">← トップページへ</a>
</nav>

<div class="page-header">
  <div class="page-header-in">
    <p class="page-lbl">COLUMN</p>
    <h1 class="page-ttl">融資の「なぜ」を整理する。</h1>
    <p class="page-desc">建設・飲食・運送業の融資実務をもとに、保証協会・審査・書類の論点を事例ベースで解説します。</p>
  </div>
</div>

<main class="main">
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">すべて</button>
    <button class="filter-btn" data-cat="kensetsu">建設業</button>
    <button class="filter-btn" data-cat="inshoku">飲食業</button>
    <button class="filter-btn" data-cat="unso">運送業</button>
    <button class="filter-btn" data-cat="hitori">一人親方</button>
    <button class="filter-btn" data-cat="ryokin">料金・制度</button>
    <button class="filter-btn" data-cat="shinsa">審査対策</button>
    <button class="filter-btn" data-cat="shikin">資金調達</button>
  </div>

  <div class="col-grid" id="col-grid">
    <div class="loading">記事を読み込んでいます...</div>
  </div>
</main>

<footer>
  <div class="ft-name">Nexcess</div>
  <div class="ft-copy">© 2026 合同会社 Nexcess. All rights reserved.</div>
</footer>

<script>
let allArticles = [];
let currentCat = 'all';

async function loadArticles() {
  try {
    const res = await fetch('../columns.json?v=' + Date.now());
    allArticles = await res.json();
    renderGrid(allArticles);
  } catch(e) {
    document.getElementById('col-grid').innerHTML =
      '<p style="color:#888;font-size:.85rem">記事の読み込みに失敗しました。</p>';
  }
}

function renderGrid(articles) {
  const grid = document.getElementById('col-grid');
  if (!articles.length) {
    grid.innerHTML = '<p style="color:#888;font-size:.85rem">該当する記事がありません。</p>';
    return;
  }
  grid.innerHTML = articles.map(a => `
    <a href="${a.file}" class="col-card">
      <span class="col-tag">${a.tag}</span>
      <div class="col-ttl">${a.title}</div>
      <div class="col-desc">${a.desc}</div>
      <div class="col-meta">
        <span class="col-date">${a.date}</span>
        <span class="col-more">読む →</span>
      </div>
    </a>
  `).join('');
}

// フィルター
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cat = btn.dataset.cat;
  currentCat = cat;
  const filtered = cat === 'all'
    ? allArticles
    : allArticles.filter(a => a.cat === cat);
  renderGrid(filtered);
});

loadArticles();
</script>
</body>
</html>
